['f2','🥙 Kati Roll Company Soho',51.5128,-0.1340,'Indian street food rolls.','5-7','Soho'],
['f3','🍜 Bao Soho',51.5120,-0.1300,'Taiwanese steamed buns.','8-12','Soho'],
['f4','🥐 Paul Bakery Covent Garden',51.5115,-0.1238,'French sandwiches and pastries.','3-6','Covent Garden'],
['f5','🌮 Wahaca Southbank',51.5062,-0.1145,'Mexican street food. Tacos from 4.','8-14','Southbank'],
['f6','🫕 Dishoom Kings Cross',51.5325,-0.1240,'Legendary bacon naan roll.','8-12','Kings Cross'],
['f7','🥪 Pret a Manger',51.5080,-0.1280,'Sandwiches 4-6.','3-6','All zones'],
['f8','🧆 Pilpel Spitalfields',51.5193,-0.0742,'Best falafel in London.','5-7','Spitalfields'],
['f9','🐟 The Golden Hind Marylebone',51.5190,-0.1520,'Fish and chips since 1914.','8-12','Marylebone'],
['f10','🫔 Monmouth Coffee Borough',51.5055,-0.0905,'Excellent coffee from 3.50.','3-5','Borough Market'],
['f11','🧀 Neals Yard Dairy Borough',51.5051,-0.0910,'Artisan bread and cheese.','5-8','Borough Market'],
['f12','🍕 Pizza Pilgrims Carnaby St',51.5135,-0.1390,'Neapolitan pizza from 10.','10-14','Soho'],
['f13','🥗 Leon Multiple Locations',51.5073,-0.1278,'Healthy fast food, wraps from 5.','5-8','All zones'],
['f14','🫙 Padella Borough Market',51.5051,-0.0919,'Handmade pasta from 8.','8-13','Borough Market'],
['f15','🍣 Yo Sushi Canary Wharf',51.5047,-0.0198,'Conveyor belt sushi.','10-18','Canary Wharf'],
['f16','🌭 Spitalfields Market Stalls',51.5195,-0.0726,'International street food.','5-8','Spitalfields'],
['f17','🍔 Byron Burger Covent Garden',51.5115,-0.1242,'Quality burgers from 10.','10-14','Covent Garden'],
['f18','🥘 Tayyabs Whitechapel',51.5136,-0.0620,'Best Pakistani food in London.','10-15','Whitechapel'],
['f19','🫖 Pavilion Cafe Victoria Park',51.5366,-0.0342,'Breakfast and lunch around 8.','6-10','East London'],
['f20','🍦 Crosstown Doughnuts',51.5130,-0.1360,'Artisan doughnuts around 4 each.','4','All zones'],
];
var map=L.map('map',{center:[51.5074,-0.1278],zoom:13,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);
function makeIcon(color,num,emoji){
  var html='<div class="marker-pin"><div class="marker-circle" style="background:'+color+';border-color:'+color+'cc;"><span class="m-emoji">'+emoji+'</span><span class="m-num">'+num+'</span></div><div class="marker-tail" style="background:'+color+'88"></div></div>';
  return L.divIcon({html:html,className:'',iconSize:[32,40],iconAnchor:[16,40],popupAnchor:[0,-42]});
}
function makeFoodIcon(){
  return L.divIcon({html:'<div class="food-marker">&#127836;</div>',className:'',iconSize:[24,24],iconAnchor:[12,12],popupAnchor:[0,-14]});
}
var placeData=PLACES.map(function(p){
  return{id:p[0],origDay:p[1],day:p[1],num:p[2],emoji:p[3],name:p[4],lat:p[5],lng:p[6],stay:p[7],transMin:p[8],transMode:p[9],desc:p[10],marker:null,rowEl:null};
});
var allPolylines={},foodMarkers=[],currentFilter='all';
var filtersVisible=true,legendVisible=true,sidebarOpen=true;
placeData.forEach(function(p){
  var color=DAY_COLORS[p.day];
  var marker=L.marker([p.lat,p.lng],{icon:makeIcon(color,p.num,p.emoji)}).addTo(map).bindPopup(buildPopup(p),{maxWidth:260});
  p.marker=marker;
});
function buildPopup(p){
  var color=DAY_COLORS[p.day];
  var days=['1','2','3','4','5','6','7'];
  var idx=days.indexOf(p.day);
  var prevDay=idx>0?days[idx-1]:null;
  var nextDay=idx<days.length-1?days[idx+1]:null;
  var switchHtml='<div class="popup-day-switch">Move: ';
  if(prevDay) switchHtml+='<button onclick="movePlace(\''+p.id+'\',\''+prevDay+'\')">&#9664; Day '+prevDay+'</button>';
  if(nextDay) switchHtml+='<button onclick="movePlace(\''+p.id+'\',\''+nextDay+'\')">Day '+nextDay+' &#9654;</button>';
  switchHtml+='</div>';
  return '<div class="popup-title">'+p.emoji+' '+p.name+'</div>'+'<div class="popup-meta" style="color:'+color+'">'+DAY_EMOJI[p.day]+' Day '+p.day+' ('+DAY_NAMES[p.day]+') - Stay: '+p.stay+'</div>'+'<div class="popup-desc">'+p.desc+'</div>'+switchHtml;
}
function movePlace(id,newDay){
  var p=placeData.find(function(x){return x.id===id;});
  if(!p) return;
  p.day=newDay;
  var color=DAY_COLORS[newDay];
  p.marker.setIcon(makeIcon(color,p.num,p.emoji));
  p.marker.setPopupContent(buildPopup(p));
  buildSidebar();
  buildPolylines();
  applyFilter(currentFilter);
  map.closePopup();
}
var sidebar=document.getElementById('sidebar');
function buildSidebar(){
  sidebar.innerHTML='';
  ['1','2','3','4','5','6','7'].forEach(function(day){
    var group=placeData.filter(function(p){return p.day===day;});
    if(group.length===0) return;
    var grpDiv=document.createElement('div');
    grpDiv.className='day-group';grpDiv.dataset.day=day;
    var hdr=document.createElement('div');
    hdr.className='day-header';
    hdr.style.background=DAY_COLORS[day]+'22';
    hdr.innerHTML='<div class="day-dot" style="background:'+DAY_COLORS[day]+'"></div>'+DAY_EMOJI[day]+' Day '+day+' - '+DAY_NAMES[day]+'<span class="day-count">'+group.length+'</span>';
    grpDiv.appendChild(hdr);
    group.forEach(function(p,idx){
      var color=DAY_COLORS[p.day];
      if(idx>0&&p.transMin){
        var tr=document.createElement('div');
        tr.className='transport-row-s';
        tr.innerHTML='<span>'+p.transMode+'</span><span class="t-time">'+p.transMin+' min</span>';
        grpDiv.appendChild(tr);
      }
      var row=document.createElement('div');
      row.className='place-row';row.style.borderLeftColor=color;
      var days=['1','2','3','4','5','6','7'];
      var dIdx=days.indexOf(p.day);
      var prevD=dIdx>0?days[dIdx-1]:null;
      var nextD=dIdx<days.length-1?days[dIdx+1]:null;
      var switchBtns='<div class="day-switch">';
      if(prevD) switchBtns+='<button title="Move to Day '+prevD+'" onclick="event.stopPropagation();movePlace(\''+p.id+'\',\''+prevD+'\')">&#9664;</button>';
      if(nextD) switchBtns+='<button title="Move to Day '+nextD+'" onclick="event.stopPropagation();movePlace(\''+p.id+'\',\''+nextD+'\')">&#9654;</button>';
      switchBtns+='</div>';
      row.innerHTML='<span class="num">'+p.num+'</span><span class="emoji">'+p.emoji+'</span><span class="name">'+p.name+'</span><span class="stay">'+p.stay+'</span>'+switchBtns;
      (function(pp){row.onclick=function(){map.setView([pp.lat,pp.lng],16);pp.marker.openPopup();};})(p);
      p.rowEl=row;
      grpDiv.appendChild(row);
    });
    sidebar.appendChild(grpDiv);
  });
  var foodGrp=document.createElement('div');
  foodGrp.className='day-group';foodGrp.dataset.day='food';
  foodGrp.innerHTML='<div class="day-header" style="background:#98FB9822;color:#98FB98"><div class="day-dot" style="background:#98FB98"></div>&#127836; Budget Food<span class="day-count">'+FOOD.length+'</span></div>';
  FOOD.forEach(function(f){
    var row=document.createElement('div');
    row.className='food-row';
    var emoji=f[1].split(' ')[0];
    row.innerHTML='<span style="font-size:13px">'+emoji+'</span><span class="f-name">'+f[1].replace(/^[^\s]+\s/,'')+'</span><span class="f-price">'+f[5]+'</span>';
    (function(ff){row.onclick=function(){map.setView([ff[2],ff[3]],16);};})(f);
    foodGrp.appendChild(row);
  });
  sidebar.appendChild(foodGrp);
}
function buildPolylines(){
  Object.values(allPolylines).forEach(function(p){map.removeLayer(p);});
  allPolylines={};
  ['1','2','3','4','5','6','7'].forEach(function(day){
    var group=placeData.filter(function(p){return p.day===day;});
    var coords=group.map(function(p){return[p.lat,p.lng];});
    if(coords.length>1){
      allPolylines[day]=L.polyline(coords,{color:DAY_COLORS[day],weight:2.5,opacity:0.5,dashArray:'6,8'}).addTo(map);
    }
  });
}
FOOD.forEach(function(f){
  var mk=L.marker([f[2],f[3]],{icon:makeFoodIcon()}).addTo(map).bindPopup('<div class="popup-title">'+f[1]+'</div><div class="popup-meta" style="color:#98FB98">Near: '+f[6]+'</div><div class="popup-desc">'+f[4]+'</div>',{maxWidth:230});
  foodMarkers.push(mk);
});
function applyFilter(day){
  currentFilter=day;
  placeData.forEach(function(p){
    if(day==='all'||p.day===day){if(!map.hasLayer(p.marker))map.addLayer(p.marker);}
    else{if(map.hasLayer(p.marker))map.removeLayer(p.marker);}
  });
  Object.entries(allPolylines).forEach(function(e){
    if(day==='all'||e[0]===day){if(!map.hasLayer(e[1]))map.addLayer(e[1]);}
    else{if(map.hasLayer(e[1]))map.removeLayer(e[1]);}
  });
  foodMarkers.forEach(function(mk){
    if(day==='all'||day==='food'){if(!map.hasLayer(mk))map.addLayer(mk);}
    else{if(map.hasLayer(mk))map.removeLayer(mk);}
  });
  document.querySelectorAll('.day-group').forEach(function(g){
    g.style.display=(day==='all'||g.dataset.day===day)?'block':'none';
  });
  if(day!=='all'){
    var points=[];
    if(day==='food'){FOOD.forEach(function(f){points.push([f[2],f[3]]);});}
    else{placeData.filter(function(p){return p.day===day;}).forEach(function(p){points.push([p.lat,p.lng]);});}
    if(points.length)map.fitBounds(points,{padding:[60,60]});
  } else {map.setView([51.5074,-0.1278],12);}
}
function filterDay(day,btn){
  document.querySelectorAll('.day-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  applyFilter(day);
}
function toggleFilters(){
  filtersVisible=!filtersVisible;
  document.getElementById('filterPanel').classList.toggle('hidden',!filtersVisible);
  document.getElementById('btnFilters').textContent=filtersVisible?'x Filters':'= Filters';
}
function toggleLegend(){
  legendVisible=!legendVisible;
  document.getElementById('legendPanel').classList.toggle('hidden',!legendVisible);
  document.getElementById('btnLegend').textContent=legendVisible?'v Legend':'^ Legend';
}
function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  var sb=document.getElementById('sidebar');
  var tog=document.getElementById('sidebarToggle');
  sb.classList.toggle('collapsed',!sidebarOpen);
  tog.classList.toggle('collapsed',!sidebarOpen);
  tog.innerHTML=sidebarOpen?'&#9664;':'&#9654;';
  document.getElementById('btnSidebar').textContent=sidebarOpen?'x List':'= List';
  setTimeout(function(){map.invalidateSize();},320);
}
buildSidebar();
buildPolylines();
applyFilter('all');
</script>
</body>
</html>
