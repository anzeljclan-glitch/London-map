['f6','🫕 Dishoom Breakfast — Kings Cross',51.5325,-0.1240,'Legendary bacon naan roll £8.','£8–12','Kings Cross'],
['f7','🥪 Pret a Manger — Everywhere',51.5080,-0.1280,'Sandwiches £4–6.','£3–6','All zones'],
['f8','🧆 Pilpel — Spitalfields',51.5193,-0.0742,'Best falafel in London. Wrap £6.','£5–7','Spitalfields'],
['f9','🐟 The Golden Hind — Marylebone',51.5190,-0.1520,'Fish & chips since 1914. ~£10.','£8–12','Marylebone'],
['f10','🫔 Monmouth Coffee — Borough Mkt',51.5055,-0.0905,'Excellent coffee from £3.50.','£3–5','Borough Market'],
['f11','🧀 Neals Yard Dairy — Borough',51.5051,-0.0910,'Artisan bread & cheese. ~£5.','£5–8','Borough Market'],
['f12','🍕 Pizza Pilgrims — Carnaby St',51.5135,-0.1390,'Neapolitan pizza from £10.','£10–14','Soho'],
['f13','🥗 Leon — Multiple Locations',51.5073,-0.1278,'Healthy fast food, wraps from £5.','£5–8','All zones'],
['f14','🫙 Padella — Borough Market',51.5051,-0.0919,'Handmade pasta from £8.','£8–13','Borough Market'],
['f15','🍣 Yo Sushi — Canary Wharf',51.5047,-0.0198,'Conveyor belt sushi. Plates from £4.','£10–18','Canary Wharf'],

const map = L.map('map',{center:[51.5074,-0.1278],zoom:13,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);
function makeIcon(color,num,emoji){
  const html=`<div class="marker-pin"><div class="marker-circle" style="background:${color};border-color:${color}cc;"><span class="m-emoji">${emoji}</span><span class="m-num">${num}</span></div><div class="marker-tail" style="background:${color}88"></div></div>`;
  return L.divIcon({html,className:'',iconSize:[34,42],iconAnchor:[17,42],popupAnchor:[0,-44]});
}
function makeFoodIcon(){
  return L.divIcon({html:'<div class="food-marker">🍜</div>',className:'',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-15]});
}
let allMarkers={},allPolylines={},foodMarkers=[];
const byDay={};
PLACES.forEach(p=>{if(!byDay[p[1]])byDay[p[1]]=[];byDay[p[1]].push(p);});
const sidebar=document.getElementById('sidebar');
['1','2','3','4','5','6','7'].forEach(day=>{
  const group=byDay[day]||[];
  const grpDiv=document.createElement('div');
  grpDiv.className='day-group';grpDiv.dataset.day=day;
  const hdr=document.createElement('div');
  hdr.className='day-header';
  hdr.style.background=DAY_COLORS[day]+'22';
  hdr.innerHTML=`<div class="day-dot" style="background:${DAY_COLORS[day]}"></div>${DAY_EMOJI[day]} ${DAY_LABELS[day]}<span class="day-count">${group.length} stops</span>`;
  grpDiv.appendChild(hdr);
  group.forEach((p,idx)=>{
    const [id,pday,num,emoji,name,lat,lng,stay,transMin,transMode,desc]=p;
    const color=DAY_COLORS[pday];
    if(idx>0&&transMin){
      const tr=document.createElement('div');
      tr.className='transport-row-s';tr.dataset.day=day;
      tr.innerHTML=`<span class="t-icon">${transMode}</span><span style="color:#555">${transMode==='🚶'?'Walk':transMode==='🚇'?'Tube':transMode==='🚌'?'Bus':transMode==='⛵'?'Boat':transMode==='🚕'?'Taxi':'Mix'}</span><span class="t-time">${transMin} min</span>`;
      grpDiv.appendChild(tr);
    }
    const row=document.createElement('div');
    row.className='place-row';row.dataset.id=id;row.style.borderLeftColor=color;
    row.innerHTML=`<span class="num">${num}</span><span class="emoji">${emoji}</span><span class="name">${name}</span><span class="stay">${stay}</span>`;
    row.onclick=()=>{const mk=allMarkers[id];if(mk){map.setView([lat,lng],16);mk.marker.openPopup();}};
    grpDiv.appendChild(row);
    const marker=L.marker([lat,lng],{icon:makeIcon(color,num,emoji)}).addTo(map).bindPopup(`<div class="popup-title">${emoji} ${name}</div><div class="popup-meta" style="color:${color}">${DAY_EMOJI[day]} Day ${day} · Stay: ${stay}</div><div class="popup-desc">${desc}</div>${transMin?`<div class="popup-transport">${transMode} <span>${transMin} min from previous</span></div>`:''}`,{maxWidth:260});
    allMarkers[id]={marker,day:pday,lat,lng};
  });
  sidebar.appendChild(grpDiv);
  const coords=group.map(p=>[p[5],p[6]]);
  if(coords.length>1){
    const poly=L.polyline(coords,{color:DAY_COLORS[day],weight:2.5,opacity:0.55,dashArray:'6,8'}).addTo(map);
    allPolylines[day]=poly;
  }
});
const foodGrp=document.createElement('div');
foodGrp.className='day-group';foodGrp.dataset.day='food';
foodGrp.innerHTML=`<div class="day-header" style="background:#98FB9822;color:#98FB98"><div class="day-dot" style="background:#98FB98"></div>🍜 Budget Food Spots<span class="day-count">${FOOD.length} spots</span></div>`;
FOOD.forEach(f=>{
  const [id,name,lat,lng,desc,price,near]=f;
  const row=document.createElement('div');
  row.className='food-row';row.dataset.day='food';
  const emoji=name.split(' ')[0];
  row.innerHTML=`<span class="f-emoji">${emoji}</span><span class="f-name">${name.replace(/^[^\s]+\s/,'')}</span><span class="f-price">${price}</span>`;
  row.onclick=()=>{map.setView([lat,lng],16);};
  foodGrp.appendChild(row);
  const mk=L.marker([lat,lng],{icon:makeFoodIcon()}).addTo(map).bindPopup(`<div class="popup-title">${name}</div><div class="popup-meta" style="color:#98FB98">🍜 ${price} · Near: ${near}</div><div class="popup-desc">${desc}</div>`,{maxWidth:240});
  foodMarkers.push(mk);
});
sidebar.appendChild(foodGrp);
function filterDay(day,btn){
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  Object.values(allMarkers).forEach(({marker,day:mDay})=>{
    if(day==='all'||mDay===day){if(!map.hasLayer(marker))map.addLayer(marker);}
    else{if(map.hasLayer(marker))map.removeLayer(marker);}
  });
  Object.entries(allPolylines).forEach(([pDay,poly])=>{
    if(day==='all'||pDay===day){if(!map.hasLayer(poly))map.addLayer(poly);}
    else{if(map.hasLayer(poly))map.removeLayer(poly);}
  });
  foodMarkers.forEach(mk=>{
    if(day==='all'||day==='food'){if(!map.hasLayer(mk))map.addLayer(mk);}
    else{if(map.hasLayer(mk))map.removeLayer(mk);}
  });
  document.querySelectorAll('.day-group').forEach(g=>{
    g.style.display=(day==='all'||g.dataset.day===day)?'block':'none';
  });
  if(day!=='all'){
    const points=[];
    if(day==='food'){FOOD.forEach(f=>points.push([f[2],f[3]]));}
    else{PLACES.filter(p=>p[1]===day).forEach(p=>points.push([p[5],p[6]]));}
    if(points.length)map.fitBounds(points,{padding:[60,60]});
  } else {
    map.setView([51.5074,-0.1278],12);
  }
}
